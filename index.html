<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>記帳本</title>
<style>
  :root{
    --paper:#f6f1e4;
    --paper-line:#e3d9c0;
    --ink:#2b3a2e;
    --ink-soft:#5c6b5d;
    --stamp:#a23b2e;
    --stamp-soft:#c97b6c;
    --gold:#b08a3e;
    --card:#fffdf8;
    --shadow:0 2px 8px rgba(43,58,46,0.12);
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      repeating-linear-gradient(transparent, transparent 27px, var(--paper-line) 28px);
    color:var(--ink);
    font-family:"Noto Serif TC","PingFang TC","Microsoft JhengHei",serif;
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  #app{max-width:480px;margin:0 auto;padding:18px 16px 90px;min-height:100vh;position:relative;}

  header.topbar{
    display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:2px solid var(--ink);
    padding-bottom:8px;margin-bottom:18px;
  }
  header.topbar h1{
    font-size:22px;letter-spacing:2px;margin:0;font-weight:700;
  }
  header.topbar .stamp-status{
    font-family:"Courier New",monospace;font-size:11px;color:var(--ink-soft);
  }
  .stamp-status.offline{color:var(--stamp);}

  .view{display:none;}
  .view.active{display:block;animation:fadein .25s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  /* ---- 記帳輸入 ---- */
  .amount-display{
    text-align:right;font-family:"Courier New",monospace;
    font-size:42px;font-weight:700;letter-spacing:1px;
    padding:18px 8px;border-bottom:1px dashed var(--ink-soft);
    margin-bottom:14px;min-height:60px;color:var(--ink);
    word-break:break-all;
  }
  .amount-display .cur{font-size:20px;color:var(--ink-soft);margin-right:4px;}

  .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
  .cat-chip{
    background:var(--card);border:1.5px solid var(--paper-line);
    border-radius:var(--radius);padding:10px 4px;text-align:center;
    cursor:pointer;transition:.15s;box-shadow:var(--shadow);
  }
  .cat-chip .emo{font-size:22px;display:block;}
  .cat-chip .name{font-size:11px;color:var(--ink-soft);margin-top:2px;display:block;}
  .cat-chip.selected{border-color:var(--stamp);background:#fff7ef;transform:scale(1.04);}
  .cat-chip.add-new{border-style:dashed;color:var(--ink-soft);}

  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
  .key{
    background:var(--card);border:1px solid var(--paper-line);border-radius:10px;
    padding:16px 0;text-align:center;font-size:20px;font-family:"Courier New",monospace;
    box-shadow:var(--shadow);user-select:none;cursor:pointer;
  }
  .key:active{background:var(--paper-line);}
  .key.fn{color:var(--stamp);font-weight:700;}

  .note-input{
    width:100%;padding:10px 12px;border:1px solid var(--paper-line);border-radius:10px;
    background:var(--card);font-family:inherit;font-size:14px;margin-bottom:12px;
  }

  .btn-save{
    width:100%;padding:14px;background:var(--ink);color:var(--paper);
    border:none;border-radius:var(--radius);font-size:16px;letter-spacing:3px;
    font-weight:700;cursor:pointer;box-shadow:var(--shadow);
  }
  .btn-save:active{transform:scale(.98);}
  .btn-save:disabled{opacity:.4;}

  /* ---- 總覽 ---- */
  .summary-card{
    background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;
    box-shadow:var(--shadow);border:1px solid var(--paper-line);
  }
  .summary-row{display:flex;justify-content:space-between;align-items:flex-end;}
  .summary-row .label{font-size:12px;color:var(--ink-soft);letter-spacing:1px;}
  .summary-row .num{font-family:"Courier New",monospace;font-size:26px;font-weight:700;}
  .summary-divider{height:1px;background:var(--paper-line);margin:10px 0;}

  .pie-wrap{display:flex;align-items:center;gap:16px;}
  .legend{flex:1;font-size:12px;}
  .legend .li{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
  .legend .dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
  .legend .amt{margin-left:auto;font-family:"Courier New",monospace;}

  .month-switch{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px;}
  .month-switch button{background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink);}
  .month-switch .ym{font-weight:700;letter-spacing:2px;}

  .entry-list{list-style:none;padding:0;margin:0;}
  .entry-list .day-head{font-size:12px;color:var(--ink-soft);margin:14px 0 6px;letter-spacing:1px;}
  .entry-item{
    display:flex;align-items:center;gap:10px;padding:9px 4px;
    border-bottom:1px solid var(--paper-line);
  }
  .entry-item .emo{font-size:18px;width:24px;text-align:center;}
  .entry-item .meta{flex:1;}
  .entry-item .meta .c{font-size:13px;}
  .entry-item .meta .n{font-size:11px;color:var(--ink-soft);}
  .entry-item .amt{font-family:"Courier New",monospace;font-weight:700;color:var(--stamp);}
  .entry-item .del{color:var(--ink-soft);font-size:14px;padding:4px 6px;cursor:pointer;}
  .empty-state{text-align:center;color:var(--ink-soft);padding:40px 0;font-size:13px;}

  /* ---- 設定 ---- */
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px;letter-spacing:1px;}
  .field input{
    width:100%;padding:10px 12px;border:1px solid var(--paper-line);border-radius:10px;
    background:var(--card);font-family:"Courier New",monospace;font-size:14px;
  }
  .sync-status-box{
    background:var(--card);border:1px solid var(--paper-line);border-radius:var(--radius);
    padding:14px;margin-bottom:14px;font-size:13px;line-height:1.7;
  }
  .sync-status-box b{color:var(--stamp);}
  .btn-secondary{
    width:100%;padding:12px;background:var(--card);color:var(--ink);
    border:1.5px solid var(--ink);border-radius:var(--radius);font-size:14px;
    font-weight:700;cursor:pointer;margin-bottom:10px;letter-spacing:1px;
  }
  .cat-manage-list{margin-bottom:14px;}
  .cat-manage-item{
    display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--paper-line);
  }
  .cat-manage-item .emo{width:24px;text-align:center;}
  .cat-manage-item .name{flex:1;font-size:14px;}
  .cat-manage-item .del{color:var(--stamp-soft);cursor:pointer;font-size:13px;}

  /* ---- modal ---- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(43,58,46,.45);display:none;
    align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal-overlay.show{display:flex;}
  .modal-box{
    background:var(--paper);border-radius:var(--radius);padding:18px;width:100%;max-width:340px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
  }
  .modal-box h3{margin:0 0 12px;font-size:16px;letter-spacing:1px;}
  .modal-box input{
    width:100%;padding:10px;border:1px solid var(--paper-line);border-radius:8px;
    margin-bottom:10px;font-family:inherit;background:var(--card);
  }
  .modal-actions{display:flex;gap:8px;}
  .modal-actions button{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-weight:700;}
  .modal-actions .cancel{background:var(--card);border:1px solid var(--paper-line);}
  .modal-actions .confirm{background:var(--ink);color:var(--paper);}

  .toast{
    position:fixed;bottom:84px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);padding:9px 18px;border-radius:20px;
    font-size:12px;z-index:60;opacity:0;transition:opacity .3s;letter-spacing:1px;
    pointer-events:none;
  }
  .toast.show{opacity:1;}

  /* ---- tab bar ---- */
  nav.tabbar{
    position:fixed;bottom:0;left:0;right:0;background:var(--card);
    border-top:1px solid var(--paper-line);display:flex;
    max-width:480px;margin:0 auto;box-shadow:0 -2px 8px rgba(0,0,0,.06);
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav.tabbar button{
    flex:1;background:none;border:none;padding:11px 0 8px;cursor:pointer;
    color:var(--ink-soft);font-family:inherit;
  }
  nav.tabbar button .ic{display:block;font-size:19px;}
  nav.tabbar button .lb{display:block;font-size:10px;margin-top:2px;letter-spacing:1px;}
  nav.tabbar button.active{color:var(--stamp);}
</style>
</head>
<body>
<div id="app">

  <header class="topbar">
    <h1>記 帳 本</h1>
    <span class="stamp-status" id="syncStatus">—</span>
  </header>

  <!-- ============ 記帳 ============ -->
  <section class="view active" id="view-record">
    <div class="amount-display" id="amountDisplay"><span class="cur">NT$</span>0</div>

    <div class="cat-grid" id="catGrid"></div>

    <input class="note-input" id="noteInput" placeholder="備註（選填）">

    <div class="keypad" id="keypad">
      <div class="key" data-k="1">1</div><div class="key" data-k="2">2</div><div class="key" data-k="3">3</div>
      <div class="key" data-k="4">4</div><div class="key" data-k="5">5</div><div class="key" data-k="6">6</div>
      <div class="key" data-k="7">7</div><div class="key" data-k="8">8</div><div class="key" data-k="9">9</div>
      <div class="key fn" data-k="back">⌫</div><div class="key" data-k="0">0</div><div class="key" data-k=".">.</div>
    </div>

    <button class="btn-save" id="saveBtn" disabled>記　　下</button>
  </section>

  <!-- ============ 總覽 ============ -->
  <section class="view" id="view-overview">
    <div class="month-switch">
      <button id="prevMonth">‹</button>
      <span class="ym" id="ymLabel">—</span>
      <button id="nextMonth">›</button>
    </div>

    <div class="summary-card">
      <div class="summary-row">
        <span class="label">今日支出</span>
        <span class="num" id="todayTotal">$0</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-row">
        <span class="label">本月支出</span>
        <span class="num" id="monthTotal">$0</span>
      </div>
    </div>

    <div class="summary-card">
      <div class="pie-wrap">
        <div id="pieChart"></div>
        <div class="legend" id="pieLegend"></div>
      </div>
    </div>

    <ul class="entry-list" id="entryList"></ul>
  </section>

  <!-- ============ 設定 ============ -->
  <section class="view" id="view-settings">
    <div class="sync-status-box" id="settingsStatusBox">尚未設定 GitHub 同步</div>

    <div class="field">
      <label>GitHub 帳號</label>
      <input id="ghUser" placeholder="例如 Christine951">
    </div>
    <div class="field">
      <label>Repository 名稱</label>
      <input id="ghRepo" placeholder="例如 expense-tracker-data">
    </div>
    <div class="field">
      <label>Personal Access Token</label>
      <input id="ghToken" type="password" placeholder="github_pat_xxxxx">
    </div>
    <button class="btn-secondary" id="saveGhBtn">儲存設定並連線</button>
    <button class="btn-secondary" id="syncNowBtn">立即手動同步</button>

    <h3 style="font-size:13px;letter-spacing:2px;color:var(--ink-soft);margin:22px 0 8px;">分　類　管　理</h3>
    <div class="cat-manage-list" id="catManageList"></div>
    <button class="btn-secondary" id="addCatBtn">＋ 新增分類</button>
  </section>

</div>

<nav class="tabbar">
  <button class="tab-btn active" data-view="record"><span class="ic">✎</span><span class="lb">記帳</span></button>
  <button class="tab-btn" data-view="overview"><span class="ic">📊</span><span class="lb">總覽</span></button>
  <button class="tab-btn" data-view="settings"><span class="ic">⚙</span><span class="lb">設定</span></button>
</nav>

<div class="modal-overlay" id="catModal">
  <div class="modal-box">
    <h3>新增分類</h3>
    <input id="newCatEmo" placeholder="輸入一個 emoji，例如 🍜" maxlength="4">
    <input id="newCatName" placeholder="分類名稱，例如 夜市">
    <div class="modal-actions">
      <button class="cancel" id="catModalCancel">取消</button>
      <button class="confirm" id="catModalConfirm">新增</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ---------------- 資料層 ---------------- */
  const LS_KEY = "expense_data_v1";
  const LS_GH  = "expense_gh_config_v1";

  const DEFAULT_CATEGORIES = [
    {id:"food", emo:"🍱", name:"餐飲"},
    {id:"transport", emo:"🚌", name:"交通"},
    {id:"shopping", emo:"🛍", name:"購物"},
    {id:"fun", emo:"🎬", name:"娛樂"},
    {id:"home", emo:"🏠", name:"居家"},
    {id:"medical", emo:"💊", name:"醫療"},
    {id:"edu", emo:"📚", name:"教育"},
    {id:"other", emo:"📎", name:"其他"},
  ];

  const PIE_COLORS = ["#a23b2e","#b08a3e","#5c6b5d","#7a8c63","#c97b6c","#8a6d3b","#3e6b8a","#6b4e8a"];

  function loadData(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return {categories: DEFAULT_CATEGORIES.slice(), expenses: [], dirty:false, lastSyncedSha:null};
  }
  function saveLocal(data){
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  }
  function loadGhConfig(){
    try{
      const raw = localStorage.getItem(LS_GH);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return {user:"", repo:"", token:""};
  }
  function saveGhConfig(cfg){
    localStorage.setItem(LS_GH, JSON.stringify(cfg));
  }

  let state = loadData();
  let gh = loadGhConfig();

  /* ---------------- GitHub 同步 ---------------- */
  const FILE_PATH = "data.json";
  let syncInFlight = false;

  function ghApiUrl(){
    return `https://api.github.com/repos/${gh.user}/${gh.repo}/contents/${FILE_PATH}`;
  }
  function hasGhConfig(){
    return gh.user && gh.repo && gh.token;
  }
  function b64EncodeUnicode(str){
    return btoa(unescape(encodeURIComponent(str)));
  }
  function b64DecodeUnicode(str){
    return decodeURIComponent(escape(atob(str)));
  }

  function setSyncStatus(text, offline){
    const el = document.getElementById("syncStatus");
    el.textContent = text;
    el.classList.toggle("offline", !!offline);
  }

  async function pullFromGithub(){
    if(!hasGhConfig()) return null;
    try{
      const res = await fetch(ghApiUrl(), {
        headers:{Authorization:`Bearer ${gh.token}`, Accept:"application/vnd.github+json"}
      });
      if(res.status === 404){
        return {notFound:true};
      }
      if(!res.ok) throw new Error("HTTP "+res.status);
      const json = await res.json();
      const content = JSON.parse(b64DecodeUnicode(json.content));
      return {content, sha: json.sha};
    }catch(e){
      return null;
    }
  }

  async function pushToGithub(){
    if(!hasGhConfig() || syncInFlight) return false;
    if(!navigator.onLine){
      setSyncStatus("離線・待同步", true);
      return false;
    }
    syncInFlight = true;
    setSyncStatus("同步中…");
    try{
      // 先取得最新 sha，避免衝突
      const latest = await pullFromGithub();
      const sha = latest && !latest.notFound ? latest.sha : undefined;

      const payload = {
        categories: state.categories,
        expenses: state.expenses
      };
      const body = {
        message: `更新記帳資料 ${new Date().toISOString()}`,
        content: b64EncodeUnicode(JSON.stringify(payload, null, 2)),
      };
      if(sha) body.sha = sha;

      const res = await fetch(ghApiUrl(), {
        method:"PUT",
        headers:{
          Authorization:`Bearer ${gh.token}`,
          Accept:"application/vnd.github+json",
          "Content-Type":"application/json"
        },
        body: JSON.stringify(body)
      });
      if(!res.ok) throw new Error("HTTP "+res.status);
      state.dirty = false;
      saveLocal(state);
      setSyncStatus("已同步 " + nowTimeLabel());
      return true;
    }catch(e){
      setSyncStatus("同步失敗，將重試", true);
      return false;
    }finally{
      syncInFlight = false;
    }
  }

  function nowTimeLabel(){
    const d = new Date();
    return d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");
  }

  async function initialSyncFromGithub(){
    if(!hasGhConfig()){
      setSyncStatus("尚未設定同步");
      return;
    }
    setSyncStatus("讀取雲端資料…");
    const remote = await pullFromGithub();
    if(remote && remote.notFound){
      // repo 內還沒有檔案，直接把目前本機資料上傳
      await pushToGithub();
      return;
    }
    if(remote && remote.content){
      // 用雲端版本為主（單裝置編輯情境下最新），但保留本機尚未同步的紀錄
      const remoteIds = new Set((remote.content.expenses||[]).map(e=>e.id));
      const localOnly = state.expenses.filter(e=>!remoteIds.has(e.id));
      state.categories = remote.content.categories && remote.content.categories.length ? remote.content.categories : state.categories;
      state.expenses = (remote.content.expenses||[]).concat(localOnly)
        .sort((a,b)=> b.date.localeCompare(a.date) || b.id - a.id);
      saveLocal(state);
      renderAll();
      if(localOnly.length){
        pushToGithub();
      }else{
        setSyncStatus("已同步 " + nowTimeLabel());
      }
    }else{
      setSyncStatus("離線，使用本機資料", true);
    }
  }

  window.addEventListener("online", ()=>{
    if(state.dirty) pushToGithub();
  });
  window.addEventListener("offline", ()=>{
    setSyncStatus("離線・本機暫存", true);
  });

  function markDirtyAndSync(){
    state.dirty = true;
    saveLocal(state);
    pushToGithub();
  }

  /* ---------------- Toast ---------------- */
  let toastTimer;
  function toast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>t.classList.remove("show"), 1800);
  }

  /* ---------------- 分頁切換 ---------------- */
  const views = {
    record: document.getElementById("view-record"),
    overview: document.getElementById("view-overview"),
    settings: document.getElementById("view-settings"),
  };
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      Object.values(views).forEach(v=>v.classList.remove("active"));
      views[btn.dataset.view].classList.add("active");
      if(btn.dataset.view === "overview") renderOverview();
      if(btn.dataset.view === "settings") renderSettingsPanel();
    });
  });

  /* ---------------- 記帳頁 ---------------- */
  let amountStr = "0";
  let selectedCatId = state.categories[0] ? state.categories[0].id : null;

  function renderCatGrid(){
    const grid = document.getElementById("catGrid");
    grid.innerHTML = "";
    state.categories.forEach(cat=>{
      const chip = document.createElement("div");
      chip.className = "cat-chip" + (cat.id===selectedCatId ? " selected":"");
      chip.innerHTML = `<span class="emo">${cat.emo}</span><span class="name">${escapeHtml(cat.name)}</span>`;
      chip.addEventListener("click", ()=>{
        selectedCatId = cat.id;
        renderCatGrid();
        updateSaveBtnState();
      });
      grid.appendChild(chip);
    });
  }

  function updateAmountDisplay(){
    document.getElementById("amountDisplay").innerHTML =
      `<span class="cur">NT$</span>${formatAmountStr(amountStr)}`;
    updateSaveBtnState();
  }
  function formatAmountStr(s){
    if(s.includes(".")){
      const [a,b] = s.split(".");
      return Number(a||0).toLocaleString() + "." + b;
    }
    return Number(s||0).toLocaleString();
  }
  function updateSaveBtnState(){
    const val = parseFloat(amountStr);
    document.getElementById("saveBtn").disabled = !(val > 0 && selectedCatId);
  }

  document.getElementById("keypad").addEventListener("click", (e)=>{
    const key = e.target.closest(".key");
    if(!key) return;
    const k = key.dataset.k;
    if(k === "back"){
      amountStr = amountStr.length>1 ? amountStr.slice(0,-1) : "0";
    }else if(k === "."){
      if(!amountStr.includes(".")) amountStr += ".";
    }else{
      if(amountStr === "0") amountStr = k;
      else if(amountStr.split(".")[1] && amountStr.split(".")[1].length>=2){
        /* 限制小數兩位 */
      }else{
        amountStr += k;
      }
    }
    updateAmountDisplay();
  });

  document.getElementById("saveBtn").addEventListener("click", ()=>{
    const val = parseFloat(amountStr);
    if(!(val>0) || !selectedCatId) return;
    const entry = {
      id: Date.now(),
      amount: val,
      categoryId: selectedCatId,
      note: document.getElementById("noteInput").value.trim(),
      date: new Date().toISOString().slice(0,10),
      ts: new Date().toISOString(),
    };
    state.expenses.unshift(entry);
    saveLocal(state);
    markDirtyAndSync();
    toast("已記下一筆　$" + val.toLocaleString());

    amountStr = "0";
    document.getElementById("noteInput").value = "";
    updateAmountDisplay();
    renderOverview();
  });

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  /* ---------------- 總覽頁 ---------------- */
  let viewMonth = new Date(); // 目前檢視的月份

  function ymKey(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }

  function renderOverview(){
    const label = document.getElementById("ymLabel");
    label.textContent = viewMonth.getFullYear()+" 年 "+(viewMonth.getMonth()+1)+" 月";

    const todayStr = new Date().toISOString().slice(0,10);
    const monthKey = ymKey(viewMonth);

    const monthExpenses = state.expenses.filter(e=>e.date.startsWith(monthKey));
    const todayExpenses = state.expenses.filter(e=>e.date===todayStr);

    document.getElementById("todayTotal").textContent =
      "$" + todayExpenses.reduce((s,e)=>s+e.amount,0).toLocaleString();
    document.getElementById("monthTotal").textContent =
      "$" + monthExpenses.reduce((s,e)=>s+e.amount,0).toLocaleString();

    renderPie(monthExpenses);
    renderEntryList(monthExpenses);
  }

  function catById(id){
    return state.categories.find(c=>c.id===id) || {emo:"❔",name:"未分類"};
  }

  function renderPie(expenses){
    const byCat = {};
    expenses.forEach(e=>{
      byCat[e.categoryId] = (byCat[e.categoryId]||0) + e.amount;
    });
    const entries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
    const total = entries.reduce((s,[,v])=>s+v,0);

    const pieEl = document.getElementById("pieChart");
    const legendEl = document.getElementById("pieLegend");

    if(total===0){
      pieEl.innerHTML = `<svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="#e3d9c0" stroke-width="14"/>
      </svg>`;
      legendEl.innerHTML = `<div style="color:var(--ink-soft);font-size:12px;">本月尚無支出紀錄</div>`;
      return;
    }

    let acc = 0;
    const r = 50, cx=60, cy=60, circ = 2*Math.PI*r;
    let svg = `<svg width="120" height="120" viewBox="0 0 120 120">`;
    entries.forEach(([catId, amt], i)=>{
      const frac = amt/total;
      const dash = frac*circ;
      const color = PIE_COLORS[i % PIE_COLORS.length];
      svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="16"
        stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-acc}" transform="rotate(-90 ${cx} ${cy})"/>`;
      acc += dash;
    });
    svg += `</svg>`;
    pieEl.innerHTML = svg;

    legendEl.innerHTML = entries.map(([catId, amt], i)=>{
      const cat = catById(catId);
      const color = PIE_COLORS[i % PIE_COLORS.length];
      return `<div class="li"><span class="dot" style="background:${color}"></span>
        <span>${cat.emo} ${escapeHtml(cat.name)}</span>
        <span class="amt">$${amt.toLocaleString()}</span></div>`;
    }).join("");
  }

  function renderEntryList(expenses){
    const list = document.getElementById("entryList");
    list.innerHTML = "";
    if(expenses.length===0){
      list.innerHTML = `<div class="empty-state">這個月還沒有任何紀錄<br>從「記帳」分頁開始第一筆吧</div>`;
      return;
    }
    const byDay = {};
    expenses.forEach(e=>{
      (byDay[e.date] = byDay[e.date]||[]).push(e);
    });
    Object.keys(byDay).sort((a,b)=>b.localeCompare(a)).forEach(day=>{
      const head = document.createElement("li");
      head.className = "day-head";
      const dayTotal = byDay[day].reduce((s,e)=>s+e.amount,0);
      head.textContent = day + "　・　小計 $" + dayTotal.toLocaleString();
      list.appendChild(head);
      byDay[day].forEach(e=>{
        const cat = catById(e.categoryId);
        const li = document.createElement("li");
        li.className = "entry-item";
        li.innerHTML = `
          <span class="emo">${cat.emo}</span>
          <span class="meta">
            <span class="c">${escapeHtml(cat.name)}</span>
            ${e.note ? `<span class="n"> ・ ${escapeHtml(e.note)}</span>`:""}
          </span>
          <span class="amt">$${e.amount.toLocaleString()}</span>
          <span class="del" data-id="${e.id}">✕</span>
        `;
        list.appendChild(li);
      });
    });
    list.querySelectorAll(".del").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const id = Number(btn.dataset.id);
        if(!confirm("刪除這筆紀錄？")) return;
        state.expenses = state.expenses.filter(e=>e.id!==id);
        saveLocal(state);
        markDirtyAndSync();
        renderOverview();
      });
    });
  }

  document.getElementById("prevMonth").addEventListener("click", ()=>{
    viewMonth.setMonth(viewMonth.getMonth()-1);
    renderOverview();
  });
  document.getElementById("nextMonth").addEventListener("click", ()=>{
    viewMonth.setMonth(viewMonth.getMonth()+1);
    renderOverview();
  });

  /* ---------------- 設定頁 ---------------- */
  function renderSettingsPanel(){
    document.getElementById("ghUser").value = gh.user||"";
    document.getElementById("ghRepo").value = gh.repo||"";
    document.getElementById("ghToken").value = gh.token||"";

    const box = document.getElementById("settingsStatusBox");
    if(hasGhConfig()){
      box.innerHTML = `已連線到 <b>${escapeHtml(gh.user)}/${escapeHtml(gh.repo)}</b><br>共 ${state.expenses.length} 筆紀錄已暫存`;
    }else{
      box.textContent = "尚未設定 GitHub 同步，目前資料只存在這台裝置";
    }
    renderCatManageList();
  }

  document.getElementById("saveGhBtn").addEventListener("click", async ()=>{
    gh = {
      user: document.getElementById("ghUser").value.trim(),
      repo: document.getElementById("ghRepo").value.trim(),
      token: document.getElementById("ghToken").value.trim(),
    };
    saveGhConfig(gh);
    toast("設定已儲存，開始連線…");
    await initialSyncFromGithub();
    renderSettingsPanel();
  });

  document.getElementById("syncNowBtn").addEventListener("click", async ()=>{
    if(!hasGhConfig()){
      toast("請先填寫並儲存 GitHub 設定");
      return;
    }
    const ok = await pushToGithub();
    toast(ok ? "同步完成" : "同步失敗，請檢查網路或 Token");
    renderSettingsPanel();
  });

  function renderCatManageList(){
    const list = document.getElementById("catManageList");
    list.innerHTML = "";
    state.categories.forEach(cat=>{
      const row = document.createElement("div");
      row.className = "cat-manage-item";
      row.innerHTML = `<span class="emo">${cat.emo}</span><span class="name">${escapeHtml(cat.name)}</span><span class="del" data-id="${cat.id}">刪除</span>`;
      list.appendChild(row);
    });
    list.querySelectorAll(".del").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const id = btn.dataset.id;
        const inUse = state.expenses.some(e=>e.categoryId===id);
        if(inUse){
          toast("此分類已有紀錄使用，無法刪除");
          return;
        }
        state.categories = state.categories.filter(c=>c.id!==id);
        saveLocal(state);
        markDirtyAndSync();
        renderCatManageList();
        renderCatGrid();
      });
    });
  }

  const catModal = document.getElementById("catModal");
  document.getElementById("addCatBtn").addEventListener("click", ()=>{
    document.getElementById("newCatEmo").value = "";
    document.getElementById("newCatName").value = "";
    catModal.classList.add("show");
  });
  document.getElementById("catModalCancel").addEventListener("click", ()=>{
    catModal.classList.remove("show");
  });
  document.getElementById("catModalConfirm").addEventListener("click", ()=>{
    const emo = document.getElementById("newCatEmo").value.trim() || "📌";
    const name = document.getElementById("newCatName").value.trim();
    if(!name){ toast("請輸入分類名稱"); return; }
    const id = "c_" + Date.now();
    state.categories.push({id, emo, name});
    saveLocal(state);
    markDirtyAndSync();
    catModal.classList.remove("show");
    renderCatManageList();
    renderCatGrid();
    toast("已新增分類");
  });

  /* ---------------- 初始化 ---------------- */
  function renderAll(){
    renderCatGrid();
    updateAmountDisplay();
    renderOverview();
    renderSettingsPanel();
  }

  renderAll();
  if(!navigator.onLine){
    setSyncStatus("離線・本機模式", true);
  }
  initialSyncFromGithub();

})();
</script>
</body>
</html>
